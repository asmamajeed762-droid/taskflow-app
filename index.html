<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks</title>
  <style>
    body { background: #0f0f0f; color: #fff; font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
    h1 { font-size: 28px; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #22c55e; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; }
    button:active { background: #16a34a; }
    #list { margin-top: 20px; }
    .task { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>✅ My Tasks</h1>
  <input id="taskInput" type="text" placeholder="My first task">
  <button id="addBtn">Add Task</button>
  <div id="list"></div>

  <script>
    const input = document.getElementById('taskInput');
    const btn = document.getElementById('addBtn');
    const list = document.getElementById('list');

    function addTask() {
      const text = input.value.trim();
      if (text === "") return;
      
      const div = document.createElement('div');
      div.className = 'task';
      div.textContent = text;
      list.appendChild(div);
      
      input.value = "";
    }

    btn.addEventListener('click', addTask);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });
  </script>
</body>
</html>
